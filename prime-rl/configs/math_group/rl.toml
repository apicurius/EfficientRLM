max_steps = 500

[wandb]
project = "math-group-debug"
name = "math-group"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 256
group_size = 8

[[orchestrator.train.env]]
id = "math-env"
name = "hendrycks-math"
args = { dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default" }
ratio = 0.5

[[orchestrator.train.env]]
id = "math-env"
name = "acereason-math"
args = { dataset_name = "nvidia/AceReason-Math", dataset_subset = "default", question_key = "problem" }
ratio = 0.5

[orchestrator.eval]
interval = 50

[[orchestrator.eval.env]]
name = "aime2024"
taskset = { id = "aime24-v1" }
num_examples = 30
group_size = 4

[trainer.model]
seq_len = 4096

[inference.model]
max_model_len = 2048


