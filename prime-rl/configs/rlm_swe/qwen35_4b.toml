output_dir = "/beegfs/mika/rlm-swe-qwen35-4b"
max_steps = 400
seq_len = 65536

[slurm]
job_name = "rlm-swe-qwen35-4b"
project_dir = "."
pre_run_command = "prime sandbox delete --label rlm-swe-qwen35-4b -y --plain || true"

[deployment]
type = "multi_node"
num_train_nodes = 1
num_infer_nodes = 1
num_infer_replicas = 2

[wandb]
project = "rlm-swe-debug"
name = "qwen35-4b"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3.5-4B"

# --- Trainer ---

[trainer]

[trainer.model]
cp = 4
cp_style = "ulysses"

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 8
max_inflight_rollouts = 512
max_off_policy_steps = 16

# Thinking enabled for the Qwen3.5 renderer.
[orchestrator.renderer]
name = "qwen3.5"
enable_thinking = true

[orchestrator.train.sampling]
temperature = 1.0

[[orchestrator.train.env]]
id = "rlm_swe"
name = "rlm-swe-r2e"

[orchestrator.train.env.args]
labels = ["rlm-swe-qwen35-4b"]

[orchestrator.prime_monitor]

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
id = "rlm_swe"
name = "rlm-swe-swebench-verified-quick"
timeout = { rollout = 3600 }

[orchestrator.eval.env.args]
task_type = "swebench"
dataset_name = "PrimeIntellect/SWE-Bench-Verified-Quick"
labels = ["rlm-swe-qwen35-4b"]

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true

[inference.model]
max_model_len = 65536

[inference.parallel]
dp = 8

# Qwen3.5-4B is a VL model; skip the vision tower for text-only SWE.
# `language_model_only` is a vLLM MultiModalConfig arg (no prime-rl field) → pass via vllm_extra.
[inference.vllm_extra]
language_model_only = true
