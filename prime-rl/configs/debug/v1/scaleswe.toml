# v1 RL run: Qwen3.6-35B-A3B (MoE) on the v1 `scaleswe-v1` SWE taskset, rlm harness on a prime
# sandbox runtime. Each scaleswe row ships its own Docker image (NEEDS_CONTAINER) which the
# Environment injects into the prime sandbox; the agent edits the repo + runs tests there (no MCP
# toolset). Router replay is enabled: trainer.enable_router_replay replays the routed-expert
# decisions returned by inference (enable_return_routed_experts).
#
# Built from configs/debug/v1/r2e_gym.toml (the v1 SWE structure) + the MoE parallelism from
# configs/general_agent/rl_qwen3_30b_a3b.toml. The deployment/parallelism is a starting point off
# the 30B-A3B reference — confirm/adjust for your cluster and the 35B / 65k-context footprint.

max_steps = 400
seq_len = 65536

[slurm]
job_name = "scaleswe-qwen36-35b-a3b-rlm"
project_dir = "."
partition = "all"
# Clean up this run's orphaned prime sandboxes before launch (label == SLURM job name).
pre_run_command = 'timeout 120 prime sandbox delete --label "$SLURM_JOB_NAME" -y || true'

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 2

[wandb]
project = "scaleswe-debug"
name = "qwen36-35b-a3b-rlm"

[weight_broadcast]
type = "nccl"

[ckpt]
interval = 50
keep_last = 1
resume_step = -1

[model]
name = "Qwen/Qwen3.6-35B-A3B"

# --- Trainer ---

[trainer]
# NCCL collective watchdog timeout — raised from default 600s: scaleswe's slow
# multi-node startup (step-0 swebench eval + slow first SWE batch) was tripping the
# 600s _ALLGATHER_BASE watchdog → SIGABRT trainer crash.
dist_timeout_seconds = 3600
# Replay the routed-expert decisions returned by inference (enable_return_routed_experts)
# so the trainer's MoE routing matches the rollout's — cuts trainer/inference mismatch on A3B.
enable_router_replay = true

[trainer.model]
cp = 2
# Qwen3.6 is a hybrid/linear-attention model — ring CP is unsupported; ulysses
# all-to-all on Q/K/V works with the non-softmax kernels.
cp_style = "ulysses"
# Chunk the LM head over tokens to avoid materializing the full [seq, vocab] logits
# (65k seq × large vocab) — big activation-memory saver. 1024 matches the SWE configs.
fused_lm_head_token_chunk_size = 1024

[trainer.model.ac]
freq = 1

[trainer.model.compile]

# --- Orchestrator ---

[orchestrator]
batch_size = 256
group_size = 16
max_off_policy_steps = 16

[orchestrator.renderer]
name = "qwen3.6"
enable_thinking = true

[orchestrator.train.sampling]
temperature = 1.0

[[orchestrator.train.env]]
name = "scaleswe"
# v1 scaleswe SWE taskset; rlm harness in a prime sandbox using the row's injected Docker image.
taskset = { id = "scaleswe-v1" }
harness = { id = "rlm", runtime = { type = "prime", labels = ["scaleswe-qwen36-35b-a3b-rlm"] } }

[orchestrator.prime_monitor]

# --- Eval: SWE-Bench Verified (first 100 tasks) every 20 steps, rlm harness on prime ---

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
name = "swebench-verified"
taskset = { id = "swebench-verified-v1", use_prime_registry = true }
harness = { id = "rlm", runtime = { type = "prime", labels = ["scaleswe-qwen36-35b-a3b-rlm"] } }
num_examples = 100
group_size = 1
timeout = { rollout = 3600 }

# --- Inference ---

[inference]
gpu_memory_utilization = 0.85
enable_prefix_caching = true
# Return per-token routed-expert decisions to the trainer for router replay
# (pairs with trainer.enable_router_replay).
enable_return_routed_experts = true

[inference.model]
max_model_len = 65536
# Qwen3.6 is not matched by the auto tool-parser resolver; set explicitly so vLLM
# enables auto tool choice (the scaleswe SWE agent sends tool_choice="auto").
tool_call_parser = "qwen3_coder"

[inference.parallel]
dp = 2
tp = 4
