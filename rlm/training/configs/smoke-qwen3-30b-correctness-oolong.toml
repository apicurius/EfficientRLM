# Qwen3-30B OOLONG smoke: correctness-only control.
# Based on rlm/training/configs/rlm-qwen3-30b-example.toml, migrated to the
# current prime-rl config signatures:
#   - [[orchestrator.post_batch_filters]] (not [[orchestrator.filters]])
#   - skip_first_step = false for base-model step-0 eval (old eval_base_model=true)
#   - group_size (not rollouts_per_example)
# Treatment files differ only in output/run labels and reward args.
output_dir = "/scratch/omeerdogan23/erlm/.research/EfficientRLM/outputs/smoke-qwen3-30b-correctness-oolong"
max_steps = 20
seq_len = 8192

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[wandb]
project = "rlm-qwen3-30b"
name = "qwen3-30b-smoke-correctness-oolong"

[deployment]
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[trainer]

[trainer.model]
fused_lm_head_token_chunk_size = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
# Attention-only LoRA for the smoke (no MLP projection adapters).
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.ckpt]
interval = 20
keep_interval = 20

[trainer.ckpt.weights]
# Save PEFT-compatible raw adapters under weights/step_N/lora_adapters/.
save_adapter_separately = true

[trainer.optim]
lr = 5e-5

[inference]
gpu_memory_utilization = 0.90

[inference.model]
max_model_len = 16384
enforce_eager = true

[inference.parallel]
tp = 4
dp = 1

[orchestrator]
batch_size = 32
group_size = 2

[orchestrator.model.lora]
# Stable adapter name used by vLLM when prime-rl hot-loads LoRA updates.
name = "qwen3-30b-smoke-correctness-oolong-lora"

[[orchestrator.post_batch_filters]]
type = "repetition"
enforce = true
window = 3000
prob_threshold = 0.99

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.ckpt]
interval = 20
keep_interval = 20

[orchestrator.train.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.train.env]]
id = "oolong"
name = "smoke-oolong-spam-train"
ratio = 1.0

[orchestrator.train.env.args]
dataset_name = "spam"
min_ctx = 32768
max_ctx = 65536
exclude_numeric = true
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
shaping_coef = 0.0
reward_style = "correctness"
# Shared resource telemetry/scales. For harness1 these feed the additive
# resource penalty; for efficiency they feed the gated efficiency bonus.
subcall_budget = 32.0
token_budget = 200000.0
iteration_weight = 1.0
subcall_weight = 1.0
token_weight = 1.0

[orchestrator.eval]
interval = 20
# Current prime-rl spelling for the old eval_base_model=true behavior:
# run the base-model eval at step 0 before any trainer update.
skip_first_step = false
num_examples = 25
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.eval.env]]
id = "oolong"
name = "smoke-oolong-trec-coarse-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
dataset_name = "trec_coarse"
min_ctx = 131072
max_ctx = 131072
exclude_numeric = false
num_examples = 25
max_iterations = 20
sub_max_tokens = 4096
