# Offline full-dataset evaluation — control arm, four-family canon (frozen: thesis ch4 sec:training-data)
# Prereqs (eval day): 1) editable-install environments/oolong_pairs + environments/longbench_codeqa into the prime-rl venv
#                     2) VERIFY the adapter-load key for eval-only mode against prime-rl docs before launch
output_dir = "/scratch/omeerdogan23/erlm/.research/EfficientRLM/outputs/offline-eval-control"

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[inference]
gpu_memory_utilization = 0.90

[inference.model]
max_model_len = 16384
enforce_eager = true

[inference.parallel]
tp = 4
dp = 1

[orchestrator]
batch_size = 32
group_size = 1

[orchestrator.model.lora]
name = "qwen3-30b-ab-control-lora"
# adapter weights: outputs/qwen3-30b-ab-control-multienv-200step/weights/step_200/lora_adapters

[orchestrator.eval]
skip_first_step = false
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.eval.env]]
id = "oolong"
name = "oolong-trec-coarse-offline"
group_size = 1

[orchestrator.eval.env.args]
dataset_name = "trec_coarse"
min_ctx = 131072
max_ctx = 131072
exclude_numeric = false
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "browsecomp_plus"
name = "browsecomp-plus-offline"
group_size = 1

[orchestrator.eval.env.args]
num_examples = 25
start_index = 125
k = 50
seed = 42
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
reward_mode = "judge"
judge_model = "openai/gpt-5-nano"

[[orchestrator.eval.env]]
id = "oolong_pairs"
name = "oolong-pairs-offline"
group_size = 1

[orchestrator.eval.env.args]
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "longbench_codeqa"
name = "longbench-codeqa-offline"
group_size = 1

[orchestrator.eval.env.args]
num_examples = 50
max_iterations = 20
sub_max_tokens = 4096
