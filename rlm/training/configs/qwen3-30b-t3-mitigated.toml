output_dir = "/scratch/omeerdogan23/erlm/.research/EfficientRLM/outputs/qwen3-30b-t3-mitigated"
max_steps = 200
seq_len = 8192

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[wandb]
project = "rlm-qwen3-30b"
name = "qwen3-30b-t3-mitigated"

[deployment]
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[trainer]

[trainer.model]
fused_lm_head_token_chunk_size = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.ckpt]
interval = 5
keep_interval = 5

[trainer.ckpt.weights]
save_adapter_separately = true

[trainer.optim]
lr = 5e-5

[inference]
gpu_memory_utilization = 0.80

[inference.model]
max_model_len = 16384
enforce_eager = false

[inference.parallel]
tp = 1
dp = 4

[orchestrator]
batch_size = 32
group_size = 4

[orchestrator.model.lora]
name = "qwen3-30b-t3-mitigated-lora"

[[orchestrator.pre_batch_filters]]
type = "zero_advantage"
enforce = true

[[orchestrator.post_batch_filters]]
type = "repetition"
enforce = true
window = 3000
prob_threshold = 0.99

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.ckpt]
interval = 5
keep_interval = 5

[orchestrator.train.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.train.env]]
id = "oolong"
name = "oolong-spam-train"
ratio = 1.0

[orchestrator.train.env.advantage]
type = "custom"
import_path = "rlm_train.adaptive_group.adaptive_group_advantage"

[orchestrator.train.env.advantage.kwargs]
base = "correctness"
beta_max = 0.15
solve_floor = 0.25
gamma = 1.0
min_span = 1.0
cost_basis = "iterations_ln_excess"
lam = 2.0
B = 5
zero_neutralize = true

[orchestrator.train.env.args]
dataset_name = "spam"
min_ctx = 32768
max_ctx = 65536
exclude_numeric = true
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0

[[orchestrator.train.env]]
id = "browsecomp_plus"
name = "browsecomp-plus-train"
ratio = 1.0

[orchestrator.train.env.advantage]
type = "custom"
import_path = "rlm_train.adaptive_group.adaptive_group_advantage"

[orchestrator.train.env.advantage.kwargs]
base = "correctness"
beta_max = 0.15
solve_floor = 0.25
gamma = 1.0
min_span = 1.0
cost_basis = "iterations_ln_excess"
lam = 2.0
B = 5
zero_neutralize = true

[orchestrator.train.env.args]
num_examples = 655
start_index = 0
k = 50
seed = 42
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
reward_mode = "judge"
judge_model = "openai/gpt-5-nano"

[orchestrator.eval]
interval = 20
skip_first_step = false
num_examples = 25
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.eval.env]]
id = "oolong"
name = "oolong-trec-coarse-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
dataset_name = "trec_coarse"
min_ctx = 131072
max_ctx = 131072
exclude_numeric = false
num_examples = 25
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "browsecomp_plus"
name = "browsecomp-plus-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
num_examples = 25
start_index = 655
k = 50
seed = 42
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
reward_mode = "judge"
judge_model = "openai/gpt-5-nano"

[[orchestrator.eval.env]]
id = "longbench_codeqa"
name = "codeqa-transfer-canary"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
num_examples = 25
max_iterations = 20
sub_max_tokens = 4096
