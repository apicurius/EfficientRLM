# A/B TREATMENT arm: adaptive-group cost lever ON (beta_max=0.20). Paired with the
# control arm (qwen3-30b-ab-control-multienv-200step.toml, beta_max=0.0); the two configs
# differ ONLY in output_dir/wandb/lora labels + beta_max. Reward untouched (binary gated
# correctness); the cost lever lives entirely in the advantage layer. See adaptive_group.py.
#   - skip_first_step = false for base-model step-0 eval (old eval_base_model=true)
#   - group_size (not rollouts_per_example)
# Treatment files differ only in output/run labels and reward args.
output_dir = "/scratch/omeerdogan23/erlm/.research/EfficientRLM/outputs/qwen3-30b-ab-treatment-multienv-200step"
max_steps = 200
seq_len = 8192

[model]
name = "Qwen/Qwen3-30B-A3B-Instruct-2507"

[wandb]
project = "rlm-qwen3-30b"
name = "qwen3-30b-ab-treatment-multienv-200step"

[deployment]
gpus_per_node = 8
num_train_gpus = 4
num_infer_gpus = 4

[trainer]

[trainer.model]
fused_lm_head_token_chunk_size = "auto"
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"

[trainer.model.ac]
mode = "full"
freq = 1

[trainer.model.lora]
rank = 32
alpha = 64
dropout = 0.0
# Attention-only LoRA (no MLP projection adapters).
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj"]

[trainer.ckpt]
interval = 20
keep_interval = 20

[trainer.ckpt.weights]
# Save PEFT-compatible raw adapters under weights/step_N/lora_adapters/.
save_adapter_separately = true

[trainer.optim]
lr = 5e-5

[inference]
gpu_memory_utilization = 0.90

[inference.model]
max_model_len = 16384
enforce_eager = true

[inference.parallel]
tp = 4
dp = 1

[orchestrator]
batch_size = 32
group_size = 4

[orchestrator.model.lora]
# Stable adapter name used by vLLM when prime-rl hot-loads LoRA updates.
name = "qwen3-30b-ab-treatment-lora"

[[orchestrator.post_batch_filters]]
type = "repetition"
enforce = true
window = 3000
prob_threshold = 0.99

[[orchestrator.post_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.ckpt]
interval = 20
keep_interval = 20

[orchestrator.train.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

# Train split: prime-rl normalizes per-env `ratio` to probabilities, so the two
# `ratio = 1.0` envs below are a 50/50 OOLONG-spam / BrowseComp+ mix ([1,1] == [0.5,0.5]).
[[orchestrator.train.env]]
id = "oolong"
name = "oolong-spam-train"
ratio = 1.0   # 50% of train prompts (normalized against browsecomp_plus below)

[orchestrator.train.env.advantage]
type = "custom"
import_path = "rlm_train.adaptive_group.adaptive_group_advantage"

[orchestrator.train.env.advantage.kwargs]
base = "correctness"
beta_max = 0.15
solve_floor = 0.25
gamma = 1.0

[orchestrator.train.env.args]
dataset_name = "spam"
min_ctx = 32768
max_ctx = 65536
exclude_numeric = true
num_examples = -1
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0

[[orchestrator.train.env]]
id = "browsecomp_plus"
name = "browsecomp-plus-train"
ratio = 1.0   # 50% of train prompts (equal weight with oolong)

[orchestrator.train.env.advantage]
type = "custom"
import_path = "rlm_train.adaptive_group.adaptive_group_advantage"

[orchestrator.train.env.advantage.kwargs]
base = "correctness"
beta_max = 0.15
solve_floor = 0.25
gamma = 1.0

[orchestrator.train.env.args]
num_examples = 125
start_index = 0
k = 50
# Split large BrowseComp+ documents into sub-LLM-budget-safe chunks; the
# local rollout scaffold rejects prompts above ~12k estimated tokens / 36k chars.
context_chunk_chars = 20000
context_chunk_overlap = 400
seed = 42
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
reward_mode = "judge"
judge_model = "openai/gpt-5-nano"

[orchestrator.eval]
interval = 20
# Current prime-rl spelling for the old eval_base_model=true behavior:
# run the base-model eval at step 0 before any trainer update.
skip_first_step = false
num_examples = 25
group_size = 1

[orchestrator.eval.sampling]
max_completion_tokens = 4096
extra_body = { enable_thinking = false }

[[orchestrator.eval.env]]
id = "oolong"
name = "oolong-trec-coarse-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
dataset_name = "trec_coarse"
min_ctx = 131072
max_ctx = 131072
exclude_numeric = false
num_examples = 25
max_iterations = 20
sub_max_tokens = 4096

[[orchestrator.eval.env]]
id = "browsecomp_plus"
name = "browsecomp-plus-eval"
num_examples = 25
group_size = 1

[orchestrator.eval.env.args]
num_examples = 25
start_index = 125
k = 50
# Split large BrowseComp+ documents into sub-LLM-budget-safe chunks; the
# local rollout scaffold rejects prompts above ~12k estimated tokens / 36k chars.
context_chunk_chars = 20000
context_chunk_overlap = 400
seed = 42
max_iterations = 20
sub_max_tokens = 4096
min_iterations = 2
min_subcall = 0
reward_mode = "judge"
judge_model = "openai/gpt-5-nano"
